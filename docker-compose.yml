services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  trawl:
    image: ghcr.io/germondai/trawl:latest
    ports:
      - "${PORT:-8191}:8191"
    shm_size: 1gb
    environment:
      REDIS_URL: redis://redis:6379
      BROWSER_POOL_SIZE: ${BROWSER_POOL_SIZE:-3}
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8191/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

volumes:
  redis_data:
